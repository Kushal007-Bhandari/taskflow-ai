<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>TaskFlow — Sign In</title>
  <link rel="stylesheet" href="css/style.css"/>
<script>
  // Apply theme before render to prevent flash
  (function(){
    var t = localStorage.getItem('tf-theme');
    if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
  })();
</script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="auth-logo-name">Task<span>Flow</span></div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" id="tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- Login -->
    <div id="tab-login">
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">No account? <a href="#" onclick="switchTab('register')">Sign up free</a></p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <span class="input-icon"></span>
            <input id="l-email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <span class="input-icon"></span>
            <input id="l-pass" type="password" class="form-input" placeholder="Your password" required autocomplete="current-password"/>
          </div>
        </div>
        <div id="l-err" class="form-error"></div>
        <button type="submit" id="l-btn" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
          Sign In
        </button>
      </form>
    </div>

    <!-- Register -->
    <div id="tab-register" class="hidden">
      <h1 class="auth-heading">Create account</h1>
      <p class="auth-sub">Already have one? <a href="#" onclick="switchTab('login')">Sign in</a></p>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon"></span>
            <input id="r-name" type="text" class="form-input" placeholder="Your full name" required autocomplete="name"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <span class="input-icon"></span>
            <input id="r-email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <span class="input-icon"></span>
            <input id="r-pass" type="password" class="form-input" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password"/>
          </div>
        </div>
        <div id="r-err" class="form-error"></div>
        <button type="submit" id="r-btn" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
          Create Account
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px">
      <button class="theme-toggle" style="margin:0 auto" onclick="Theme.toggle()" title="Toggle theme">
        <span class="theme-toggle-icon" id="idx-theme-icon"></span>
      </button>
      <div class="theme-label" style="font-size:11px;color:var(--text-3);margin-top:4px">Dark mode</div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text-3);margin-top:12px">
      BCA Project II &nbsp;·&nbsp; TaskFlow AI &nbsp;·&nbsp; TU FOHSS
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/auth.js"></script>
<script>
  Theme.init();
  Auth.requireGuest();
  // set index theme icon
  (function(){
    const el = document.getElementById('idx-theme-icon');
    if(el) el.innerHTML = document.documentElement.getAttribute('data-theme')==='dark' ? Icons.sun(18) : Icons.moon(18);
  })();

  // Inject icons
  document.querySelectorAll('.input-icon').forEach((el, i) => {
    const iconMap = [Icons.mail(16), Icons.lock(16), Icons.user(16), Icons.mail(16), Icons.lock(16)];
    el.innerHTML = iconMap[i] || '';
  });

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('tab-register').classList.toggle('hidden', tab !== 'register');
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('l-btn');
    const err = document.getElementById('l-err');
    err.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    try {
      await Auth.login(document.getElementById('l-email').value, document.getElementById('l-pass').value);
      window.location.href = '/dashboard.html';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('r-btn');
    const err = document.getElementById('r-err');
    err.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating...';
    try {
      await Auth.register(document.getElementById('r-name').value, document.getElementById('r-email').value, document.getElementById('r-pass').value);
      window.location.href = '/dashboard.html';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
