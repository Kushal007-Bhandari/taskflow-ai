<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>TaskFlow — Analytics</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
<script>
  // Apply theme before render to prevent flash
  (function(){
    var t = localStorage.getItem('tf-theme');
    if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
  })();
</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="app-header">
  <button class="btn btn-ghost btn-icon" onclick="Drawer.open()"><span id="menu-icon"></span></button>
  <div class="header-title">Analytics</div>
  <button class="theme-toggle" onclick="Theme.toggle()" title="Toggle theme">
    <span class="theme-toggle-icon"></span>
  </button>
</header>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span id="nav-home"></span>Tasks</a>
  <a href="analytics.html" class="nav-item active"><span id="nav-chart"></span>Analytics</a>
  <button class="nav-fab" onclick="window.location.href='dashboard.html'" aria-label="New Task"><span id="nav-plus"></span></button>
  <a href="summary.html" class="nav-item"><span id="nav-brain"></span>AI</a>
  <button class="nav-item" onclick="Drawer.open()"><span id="nav-list"></span>More</button>
</nav>

<div class="drawer-overlay" id="drawer-overlay" onclick="Drawer.close()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <a href="dashboard.html" class="drawer-logo" style="text-decoration:none;cursor:pointer">
      <div class="drawer-logo-icon"><span id="drawer-check"></span></div>
      <div class="drawer-logo-name">Task<span>Flow</span></div>
    </a>
    <button class="btn btn-ghost btn-icon btn-sm" onclick="Drawer.close()"><span id="drawer-close"></span></button>
  </div>
  <nav class="drawer-nav">
    <div class="drawer-section-label">Navigation</div>
    <a href="dashboard.html" class="drawer-nav-item"><span id="d-home"></span> Dashboard</a>
    <a href="analytics.html" class="drawer-nav-item active"><span id="d-chart"></span> Analytics</a>
    <a href="summary.html"   class="drawer-nav-item"><span id="d-brain"></span> AI Summary</a>
  </nav>
  <div class="drawer-footer">
    <div class="drawer-theme-row">
      <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:flex-start;gap:10px" onclick="Theme.toggle()">
        <span class="theme-toggle-icon" style="color:var(--text-2)"></span>
        <span class="theme-label" style="font-size:13px;color:var(--text-2)">Dark mode</span>
      </button>
    </div>
    <div class="drawer-user" onclick="Auth.logout()">
      <div class="avatar" data-user-avatar style="width:36px;height:36px;font-size:14px">?</div>
      <div><div class="user-name" data-user-name>Loading...</div><div class="logout-hint">Tap to sign out</div></div>
      <span style="margin-left:auto;color:var(--text-3)" id="d-logout"></span>
    </div>
  </div>
</aside>

<main class="app-main">

  <!-- Range selector -->
  <div class="range-tabs">
    <button class="range-tab" data-days="7"   onclick="setRange(7)">7 Days</button>
    <button class="range-tab active" data-days="30" onclick="setRange(30)">30 Days</button>
    <button class="range-tab" data-days="90"  onclick="setRange(90)">90 Days</button>
    <button class="range-tab" data-days="365" onclick="setRange(365)">1 Year</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">Daily Activity</div>
      <div class="card-sub">Created vs completed per day</div>
      <div class="chart-wrap"><canvas id="activity-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">By Priority</div>
      <div class="card-sub">Task distribution</div>
      <div class="chart-wrap"><canvas id="priority-chart"></canvas></div>
    </div>
  </div>

  <div class="charts-row-2">
    <div class="card">
      <div class="card-title">By Category</div>
      <div class="card-sub">Tasks per category</div>
      <div class="chart-wrap"><canvas id="category-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Best Days</div>
      <div class="card-sub">Completions by weekday</div>
      <div class="chart-wrap"><canvas id="weekday-chart"></canvas></div>
    </div>
  </div>

  <!-- Category table -->
  <div class="card">
    <div class="card-title">Category Breakdown</div>
    <div class="card-sub">Completion rates</div>
    <div class="overflow-x" id="cat-table"></div>
  </div>

</main>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
let range = 30;
let charts = {};

Chart.defaults.font.family = "'Inter', sans-serif";

function getChartColors() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  return {
    text:   isDark ? '#94a3b8' : '#64748b',
    grid:   isDark ? '#1e2d45' : '#e2e8f0',
    radar:  isDark ? '#1e2d45' : '#e2e8f0',
  };
}

function applyChartDefaults() {
  const c = getChartColors();
  Chart.defaults.color       = c.text;
  Chart.defaults.borderColor = c.grid;
}
applyChartDefaults();

async function init() {
  Theme.init();
  applyChartDefaults();
  injectIcons();
  const user = await Auth.requireAuth();
  if (!user) return;
  populateSidebarUser();
  await loadStats();
}

function injectIcons() {
  document.getElementById('menu-icon').innerHTML  = Icons.menu(20);
  document.getElementById('nav-home').innerHTML   = Icons.home(22);
  document.getElementById('nav-chart').innerHTML  = Icons.chart(22);
  document.getElementById('nav-plus').innerHTML   = Icons.plus(24);
  document.getElementById('nav-brain').innerHTML  = Icons.brain(22);
  document.getElementById('nav-list').innerHTML   = Icons.list(22);
  document.getElementById('drawer-check').innerHTML = Icons.check(18);
  document.getElementById('drawer-close').innerHTML = Icons.x(18);
  document.getElementById('d-home').innerHTML     = Icons.home(18);
  document.getElementById('d-chart').innerHTML    = Icons.chart(18);
  document.getElementById('d-brain').innerHTML    = Icons.brain(18);
  document.getElementById('d-logout').innerHTML   = Icons.logout(16);
  document.querySelectorAll('.theme-toggle-icon').forEach(el => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    el.innerHTML = isDark ? Icons.sun(18) : Icons.moon(18);
  });
}

async function loadStats() {
  try {
    const data = await TodoAPI.getStats(range);
    renderStats(data.overview);
    renderActivity(data.dailyCreated, data.dailyCompletions);
    renderPriority(data.priorityBreakdown);
    renderCategory(data.categoryBreakdown);
    renderWeekday(data.byDayOfWeek);
    renderCatTable(data.categoryBreakdown);
  } catch(e) { Toast.error('Failed to load analytics'); }
}

function setRange(days) {
  range = days;
  document.querySelectorAll('.range-tab').forEach(t =>
    t.classList.toggle('active', parseInt(t.dataset.days) === days));
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  applyChartDefaults();
  loadStats();
}

function renderStats(o) {
  const rate = o.total > 0 ? Math.round(o.completed / o.total * 100) : 0;
  const recentRate = o.recent_total > 0 ? Math.round(o.recent_completed / o.recent_total * 100) : 0;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--accent-bg);color:var(--accent-2)">${Icons.list(20)}</div>
      <div class="stat-value">${o.total}</div><div class="stat-label">All Time</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--green-bg);color:var(--green)">${Icons.circle_check(20)}</div>
      <div class="stat-value" style="color:var(--green)">${o.completed}</div><div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--blue-bg);color:var(--blue)">${Icons.trending(20)}</div>
      <div class="stat-value" style="color:var(--blue)">${rate}%</div><div class="stat-label">All Time Rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--${o.overdue?'red':'accent'}-bg);color:var(--${o.overdue?'red':'accent-2'})">${o.overdue?Icons.alert(20):Icons.sparkles(20)}</div>
      <div class="stat-value" style="color:var(--${o.overdue?'red':'accent-2'})">${o.overdue||recentRate+'%'}</div>
      <div class="stat-label">${o.overdue?'Overdue':`Last ${range}d`}</div>
    </div>`;
}

function renderActivity(created, completed) {
  const days = DateUtils.lastNDays(Math.min(range, 30));
  const cMap = Object.fromEntries(created.map(d => [d.date, +d.count]));
  const dMap = Object.fromEntries(completed.map(d => [d.date, +d.count]));
  const ctx = document.getElementById('activity-chart').getContext('2d');
  charts.activity = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: days.map(d => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })),
      datasets: [
        { label: 'Created',   data: days.map(d => cMap[d]||0), backgroundColor: 'rgba(59,130,246,0.5)', borderColor: '#3b82f6', borderWidth: 1, borderRadius: 4 },
        { label: 'Completed', data: days.map(d => dMap[d]||0), backgroundColor: 'rgba(34,197,94,0.5)',  borderColor: '#22c55e', borderWidth: 1, borderRadius: 4 },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { x: { grid: { color: getChartColors().grid }, ticks: { maxTicksLimit: 8 } }, y: { grid: { color: getChartColors().grid }, beginAtZero: true, ticks: { stepSize: 1 } } } },
  });
}

function renderPriority(data) {
  const colors = { high: '#ef4444', medium: '#f59e0b', low: '#22c55e' };
  const ctx = document.getElementById('priority-chart').getContext('2d');
  charts.priority = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(d => d.priority.charAt(0).toUpperCase() + d.priority.slice(1)),
      datasets: [{ data: data.map(d => +d.count), backgroundColor: data.map(d => colors[d.priority]||'#94a3b8'), borderColor: getComputedStyle(document.documentElement).getPropertyValue('--bg-card').trim() || '#fff', borderWidth: 3, hoverOffset: 6 }],
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 14, usePointStyle: true } } }, cutout: '68%' },
  });
}

function renderCategory(data) {
  const ctx = document.getElementById('category-chart').getContext('2d');
  charts.category = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.name),
      datasets: [{ data: data.map(d => +d.count), backgroundColor: data.map(d => d.color+'80'), borderColor: data.map(d => d.color), borderWidth: 1, borderRadius: 6 }],
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: getChartColors().grid }, beginAtZero: true }, y: { grid: { display: false } } } },
  });
}

function renderWeekday(data) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const counts = Array(7).fill(0);
  data.forEach(d => { counts[+d.dow] = +d.count; });
  const ctx = document.getElementById('weekday-chart').getContext('2d');
  charts.weekday = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: days,
      datasets: [{ label: 'Completions', data: counts, backgroundColor: 'rgba(99,102,241,0.2)', borderColor: '#6366f1', borderWidth: 2, pointBackgroundColor: '#6366f1', pointRadius: 4 }],
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { grid: { color: getChartColors().radar }, pointLabels: { color: getChartColors().text, font: { size: 11 } }, ticks: { display: false }, beginAtZero: true } } },
  });
}

function renderCatTable(data) {
  if (!data.length) { document.getElementById('cat-table').innerHTML = '<p class="text-sm text-2" style="padding:16px">No data yet</p>'; return; }
  document.getElementById('cat-table').innerHTML = `
    <table class="data-table">
      <thead><tr>
        <th>Category</th><th style="text-align:right">Total</th>
        <th style="text-align:right">Done</th><th>Rate</th>
      </tr></thead>
      <tbody>${data.map(c => {
        const r = c.count > 0 ? Math.round(c.completed / c.count * 100) : 0;
        const col = r >= 70 ? 'var(--green)' : r >= 40 ? 'var(--yellow)' : 'var(--red)';
        return `<tr>
          <td><span style="display:inline-flex;align-items:center;gap:8px">
            <span style="width:9px;height:9px;border-radius:50%;background:${c.color};display:inline-block"></span>
            ${esc(c.name)}
          </span></td>
          <td style="text-align:right;font-family:var(--font-mono)">${c.count}</td>
          <td style="text-align:right;font-family:var(--font-mono);color:var(--green)">${c.completed}</td>
          <td style="min-width:120px">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="progress-track" style="flex:1"><div class="progress-fill" style="width:${r}%;background:${col}"></div></div>
              <span style="font-family:var(--font-mono);font-size:11px;color:${col};min-width:32px">${r}%</span>
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
init();
</script>
</body>
</html>
