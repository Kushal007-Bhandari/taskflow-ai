<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>TaskFlow — Dashboard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Mobile Header -->
<header class="app-header">
  <button class="btn btn-ghost btn-icon" onclick="Drawer.open()" aria-label="Menu">
    <span id="menu-icon"></span>
  </button>
  <div class="header-title">My Tasks</div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-icon" onclick="toggleSearch()" aria-label="Search">
      <span id="search-icon-btn"></span>
    </button>
    <button class="btn btn-primary btn-icon" onclick="openAddModal()" aria-label="New Task">
      <span id="header-plus"></span>
    </button>
  </div>
</header>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">
    <span id="nav-home"></span>
    Tasks
  </a>
  <a href="analytics.html" class="nav-item">
    <span id="nav-chart"></span>
    Analytics
  </a>
  <button class="nav-fab" onclick="openAddModal()" aria-label="New Task">
    <span id="nav-plus"></span>
  </button>
  <a href="summary.html" class="nav-item">
    <span id="nav-brain"></span>
    AI
  </a>
  <button class="nav-item" onclick="Drawer.open()">
    <span id="nav-list"></span>
    More
  </button>
</nav>

<!-- Drawer (sidebar) -->
<div class="drawer-overlay" id="drawer-overlay" onclick="Drawer.close()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-logo">
      <div class="drawer-logo-icon">
        <span id="drawer-logo-icon"></span>
      </div>
      <div class="drawer-logo-name">Task<span>Flow</span></div>
    </div>
    <button class="btn btn-ghost btn-icon btn-sm" onclick="Drawer.close()">
      <span id="drawer-close"></span>
    </button>
  </div>

  <nav class="drawer-nav">
      <button class="btn btn-primary btn-full" style="margin-bottom:16px" onclick="openAddModal();Drawer.close()">
        <span id="d-plus"></span> New Task
      </button>
    <div class="drawer-section-label">Navigation</div>
    <a href="dashboard.html" class="drawer-nav-item active">
      <span id="d-home"></span> Dashboard
    </a>
    <a href="analytics.html" class="drawer-nav-item">
      <span id="d-chart"></span> Analytics
    </a>
    <a href="summary.html" class="drawer-nav-item">
      <span id="d-brain"></span> AI Summary
    </a>

    <div class="drawer-section-label">Categories</div>
    <div id="drawer-categories">
      <div class="skeleton" style="height:40px;margin-bottom:6px"></div>
      <div class="skeleton" style="height:40px;margin-bottom:6px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div>
  </nav>

  <div class="drawer-footer">
    <div class="drawer-user" onclick="Auth.logout()">
      <div class="avatar" id="drawer-avatar" data-user-avatar style="width:36px;height:36px;font-size:14px">?</div>
      <div>
        <div class="user-name" data-user-name>Loading...</div>
        <div class="logout-hint">Tap to sign out</div>
      </div>
      <span style="margin-left:auto;color:var(--text-3)" id="drawer-logout"></span>
    </div>
  </div>
</aside>

<!-- Main content -->
<main class="app-main">

  <!-- Search (hidden by default on mobile) -->
  <div id="search-wrap" class="hidden" style="margin-bottom:14px">
    <div class="search-bar">
      <span class="search-icon" id="search-icon-inner"></span>
      <input id="search-input" type="search" placeholder="Search tasks..." autocomplete="off"/>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Overall Progress</span>
      <span id="prog-label">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- Filters -->
  <div class="filter-row" id="filter-row">
    <button class="chip active" data-status="">All</button>
    <button class="chip" data-status="pending">Pending</button>
    <button class="chip" data-status="in_progress">In Progress</button>
    <button class="chip" data-status="completed">Completed</button>
    <div class="select-wrap">
      <select class="app-select" id="filter-priority">
        <option value="">All Priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="select-wrap">
      <select class="app-select" id="filter-cat">
        <option value="">All Categories</option>
      </select>
    </div>
  </div>

  <!-- Todo List -->
  <div id="todo-list">
    <div class="skeleton" style="height:78px;border-radius:14px;margin-bottom:8px"></div>
    <div class="skeleton" style="height:78px;border-radius:14px;margin-bottom:8px"></div>
    <div class="skeleton" style="height:78px;border-radius:14px"></div>
  </div>

</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="todo-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">New Task</h2>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="Modal.close('todo-modal')">
        <span id="modal-close-icon"></span>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id"/>

      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input id="t-title" type="text" class="form-input-plain" placeholder="What needs to be done?" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="t-desc" class="form-input-plain" rows="2" placeholder="Optional details..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="t-priority" class="form-input-plain">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="t-status" class="form-input-plain">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="t-cat" class="form-input-plain">
            <option value="">None</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input id="t-due" type="date" class="form-input-plain"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('todo-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveTodo()">Save Task</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
// ── State ────────────────────────────────────────────────────
let allTodos = [], allCats = [];
let filters = { status: '', priority: '', category_id: '', search: '' };
let searchVisible = false;

// ── Init ─────────────────────────────────────────────────────
async function init() {
  injectIcons();
  const user = await Auth.requireAuth();
  if (!user) return;
  populateSidebarUser();
  await Promise.all([loadCats(), loadTodos()]);
  setupListeners();
}

function injectIcons() {
  document.getElementById('menu-icon').innerHTML        = Icons.menu(20);
  document.getElementById('header-plus').innerHTML     = Icons.plus(20);
  document.getElementById('search-icon-btn').innerHTML  = Icons.search(20);
  document.getElementById('search-icon-inner').innerHTML= Icons.search(16);
  document.getElementById('nav-home').innerHTML         = Icons.home(22);
  document.getElementById('nav-chart').innerHTML        = Icons.chart(22);
  document.getElementById('nav-plus').innerHTML         = Icons.plus(24);
  document.getElementById('nav-brain').innerHTML        = Icons.brain(22);
  document.getElementById('nav-list').innerHTML         = Icons.list(22);
  document.getElementById('drawer-logo-icon').innerHTML = Icons.check(18);
  document.getElementById('drawer-close').innerHTML     = Icons.x(18);
  document.getElementById('d-plus').innerHTML           = Icons.plus(16);
  document.getElementById('d-home').innerHTML           = Icons.home(18);
  document.getElementById('d-chart').innerHTML          = Icons.chart(18);
  document.getElementById('d-brain').innerHTML          = Icons.brain(18);
  document.getElementById('drawer-logout').innerHTML    = Icons.logout(16);
  document.getElementById('modal-close-icon').innerHTML = Icons.x(18);
}

function toggleSearch() {
  searchVisible = !searchVisible;
  document.getElementById('search-wrap').classList.toggle('hidden', !searchVisible);
  if (searchVisible) document.getElementById('search-input').focus();
}

// ── Load ─────────────────────────────────────────────────────
async function loadTodos() {
  try {
    const f = {};
    if (filters.status)      f.status      = filters.status;
    if (filters.priority)    f.priority    = filters.priority;
    if (filters.category_id) f.category_id = filters.category_id;
    if (filters.search)      f.search      = filters.search;
    allTodos = await TodoAPI.getTodos(f);
    renderTodos();
    renderStats();
  } catch(e) { Toast.error('Failed to load tasks'); }
}

async function loadCats() {
  try {
    allCats = await TodoAPI.getCategories();
    renderDrawerCats();
    populateCatDropdowns();
  } catch(e) { console.error(e); }
}

// ── Render todos ──────────────────────────────────────────────
function renderTodos() {
  const el = document.getElementById('todo-list');
  if (!allTodos.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">${Icons.list(28)}</div>
      <h3>${filters.status || filters.search ? 'No results' : 'No tasks yet'}</h3>
      <p>${filters.status || filters.search ? 'Try changing filters' : 'Create your first task to get started'}</p>
      <button class="btn btn-primary" onclick="openAddModal()">
        ${Icons.plus(16)} New Task
      </button>
    </div>`;
    return;
  }

  el.innerHTML = allTodos.map(t => {
    const done  = t.status === 'completed';
    const over  = t.due_date && DateUtils.isOverdue(t.due_date) && !done;
    const soon  = t.due_date && DateUtils.isSoon(t.due_date) && !done;
    return `<div class="todo-item ${done ? 'completed' : ''} p-${t.priority}" onclick="openEditModal('${t.id}')">
      <button class="todo-check ${done ? 'done' : ''}"
        onclick="event.stopPropagation();toggleTodo('${t.id}','${t.status}')">
        ${done ? Icons.check(13) : ''}
      </button>
      <div class="todo-body">
        <div class="todo-title">${esc(t.title)}</div>
        <div class="todo-meta">
          ${t.category_name ? `<span class="tag tag-cat">
            <span style="width:7px;height:7px;border-radius:50%;background:${t.category_color};display:inline-block"></span>
            ${esc(t.category_name)}
          </span>` : ''}
          ${priorityTag(t.priority)}
          ${t.status === 'in_progress' ? `<span class="tag tag-blue">In Progress</span>` : ''}
          ${t.due_date ? `<span class="tag tag-date ${over ? 'overdue' : soon ? 'soon' : ''}">
            ${Icons.calendar(11)} ${DateUtils.formatShort(t.due_date)}
          </span>` : ''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();openEditModal('${t.id}')">${Icons.edit(15)}</button>
        <button class="btn btn-danger btn-icon btn-sm" onclick="event.stopPropagation();deleteTodo('${t.id}')">${Icons.trash(15)}</button>
      </div>
    </div>`;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats() {
  const total     = allTodos.filter(t => t.status !== 'cancelled').length;
  const completed = allTodos.filter(t => t.status === 'completed').length;
  const pending   = allTodos.filter(t => t.status === 'pending').length;
  const overdue   = allTodos.filter(t => t.due_date && DateUtils.isOverdue(t.due_date) && t.status !== 'completed').length;
  const rate      = completionRate(completed, total);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--accent-bg);color:var(--accent-2)">${Icons.list(20)}</div>
      <div class="stat-value">${total}</div>
      <div class="stat-label">Total Tasks</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--green-bg);color:var(--green)">${Icons.circle_check(20)}</div>
      <div class="stat-value" style="color:var(--green)">${completed}</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--blue-bg);color:var(--blue)">${Icons.clock(20)}</div>
      <div class="stat-value" style="color:var(--blue)">${pending}</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:var(--${overdue?'red':'accent'}-bg);color:var(--${overdue?'red':'accent-2'})">${overdue ? Icons.alert(20) : Icons.trending(20)}</div>
      <div class="stat-value" style="color:var(--${overdue?'red':'accent-2'})">${overdue || rate+'%'}</div>
      <div class="stat-label">${overdue ? 'Overdue' : 'Success Rate'}</div>
    </div>`;

  document.getElementById('prog-fill').style.width = rate + '%';
  document.getElementById('prog-label').textContent = rate + '%';
}

// ── Drawer cats ───────────────────────────────────────────────
function renderDrawerCats() {
  document.getElementById('drawer-categories').innerHTML = `
    <button class="drawer-nav-item" onclick="filterByCat('');Drawer.close()">
      ${Icons.folder(16)} All Tasks
      <span class="drawer-badge">${allTodos.length}</span>
    </button>
    ${allCats.map(c => `
      <button class="drawer-nav-item" onclick="filterByCat('${c.id}');Drawer.close()">
        <span class="cat-dot" style="background:${c.color}"></span>
        ${esc(c.name)}
        <span class="drawer-badge">${c.todo_count || 0}</span>
      </button>`).join('')}`;
}

function populateCatDropdowns() {
  const opts = allCats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  document.getElementById('filter-cat').innerHTML = `<option value="">All Categories</option>${opts}`;
  document.getElementById('t-cat').innerHTML = `<option value="">None</option>${opts}`;
}

// ── Actions ───────────────────────────────────────────────────
async function toggleTodo(id, status) {
  try {
    await TodoAPI.toggleComplete(id, status);
    await loadTodos();
    Toast.success(status === 'completed' ? 'Marked as pending' : 'Task completed!');
  } catch(e) { Toast.error('Failed to update'); }
}

async function deleteTodo(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await TodoAPI.deleteTodo(id);
    await loadTodos();
    Toast.success('Task deleted');
  } catch(e) { Toast.error('Failed to delete'); }
}

function openAddModal() {
  resetModal();
  document.getElementById('modal-title').textContent = 'New Task';
  Modal.open('todo-modal');
}

function openEditModal(id) {
  const t = allTodos.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('edit-id').value     = t.id;
  document.getElementById('t-title').value     = t.title;
  document.getElementById('t-desc').value      = t.description || '';
  document.getElementById('t-priority').value  = t.priority;
  document.getElementById('t-status').value    = t.status;
  document.getElementById('t-cat').value       = t.category_id || '';
  document.getElementById('t-due').value       = DateUtils.toInput(t.due_date);
  Modal.open('todo-modal');
}

async function saveTodo() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { Toast.error('Title is required'); return; }

  const btn = document.getElementById('save-btn');
  setLoading(btn, true, 'Saving...');

  const payload = {
    title,
    description:  document.getElementById('t-desc').value,
    priority:     document.getElementById('t-priority').value,
    status:       document.getElementById('t-status').value,
    category_id:  document.getElementById('t-cat').value || null,
    due_date:     document.getElementById('t-due').value || null,
  };

  const editId = document.getElementById('edit-id').value;

  try {
    if (editId) {
      await TodoAPI.updateTodo({ ...payload, id: editId });
      Toast.success('Task updated!');
    } else {
      await TodoAPI.createTodo(payload);
      Toast.success('Task created!');
    }
    Modal.close('todo-modal');
    resetModal();
    await loadTodos();
  } catch(e) {
    Toast.error(e.message);
  } finally {
    setLoading(btn, false);
  }
}

function resetModal() {
  document.getElementById('edit-id').value    = '';
  document.getElementById('t-title').value    = '';
  document.getElementById('t-desc').value     = '';
  document.getElementById('t-priority').value = 'medium';
  document.getElementById('t-status').value   = 'pending';
  document.getElementById('t-cat').value      = '';
  document.getElementById('t-due').value      = '';
}

function filterByCat(catId) {
  filters.category_id = catId;
  loadTodos();
}

// ── Listeners ─────────────────────────────────────────────────
function setupListeners() {
  document.querySelectorAll('.chip[data-status]').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip[data-status]').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      filters.status = c.dataset.status;
      loadTodos();
    });
  });
  document.getElementById('filter-priority').addEventListener('change', e => {
    filters.priority = e.target.value; loadTodos();
  });
  document.getElementById('filter-cat').addEventListener('change', e => {
    filters.category_id = e.target.value; loadTodos();
  });
  document.getElementById('search-input').addEventListener('input', debounce(e => {
    filters.search = e.target.value; loadTodos();
  }, 400));
}

init();
</script>
</body>
</html>
